<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1125" viewBox="0 0 900 1125" fill="none">
  <defs>
    <linearGradient id="pap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0FDFA"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.88" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="matrix" values="0 0 0 0 0.09  0 0 0 0 0.08  0 0 0 0 0.08  0 0 0 0.09 0"/>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect x="34" y="34" width="832" height="1057" rx="48" fill="url(#pap)"/>

  <!-- ancient column -->
  <path d="M300 270c60-40 240-40 300 0" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <path d="M330 330c40-24 200-24 240 0" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <path d="M350 360c-30 150-40 320-30 510" stroke="#0F172A" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <path d="M550 360c30 150 40 320 30 510" stroke="#0F172A" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
  <path d="M320 920c70 42 190 42 260 0" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.5"/>

  <!-- carved pattern -->
  <path d="M410 470c28 18 52 18 80 0" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <path d="M392 560c40 20 76 20 116 0" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <path d="M380 650c50 26 90 26 140 0" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.45"/>

  <!-- dust scribbles -->
  <path d="M210 820c56-20 112-20 168 0" stroke="#0F172A" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
  <path d="M522 820c56-20 112-20 168 0" stroke="#0F172A" stroke-width="8" stroke-linecap="round" opacity="0.2"/>

  <rect x="34" y="34" width="832" height="1057" rx="48" filter="url(#grain)" opacity="0.18"/>
</svg>
