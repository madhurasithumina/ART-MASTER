<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1125" viewBox="0 0 900 1125" fill="none">
  <defs>
    <linearGradient id="pap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFBEB"/>
      <stop offset="1" stop-color="#FEF3C7"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="matrix" values="0 0 0 0 0.09  0 0 0 0 0.08  0 0 0 0 0.06  0 0 0 0.10 0"/>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect x="34" y="34" width="832" height="1057" rx="48" fill="url(#pap)"/>

  <!-- worn edges -->
  <path d="M124 160c-22 96-28 258-20 412 10 186-8 312 6 456 8 82 18 136 24 164" stroke="#0F172A" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 18" opacity="0.45"/>
  <path d="M776 160c22 96 28 258 20 412-10 186 8 312-6 456-8 82-18 136-24 164" stroke="#0F172A" stroke-width="10" stroke-linecap="round" stroke-dasharray="2 18" opacity="0.45"/>

  <!-- ancient motif: concentric seal -->
  <path d="M450 360c-124 0-224 100-224 224s100 224 224 224 224-100 224-224-100-224-224-224Z" stroke="#0F172A" stroke-width="12" opacity="0.9"/>
  <path d="M450 418c-92 0-166 74-166 166s74 166 166 166 166-74 166-166-74-166-166-166Z" stroke="#0F172A" stroke-width="10" opacity="0.7"/>
  <path d="M450 470c-62 0-112 50-112 112s50 112 112 112 112-50 112-112-50-112-112-112Z" stroke="#0F172A" stroke-width="8" opacity="0.55"/>

  <!-- runes / glyph-like strokes (abstract, not real script) -->
  <path d="M278 594h344" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
  <path d="M310 540v110" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <path d="M352 550c18 18 18 54 0 72" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <path d="M420 548c0 52 60 52 60 0 0-52-60-52-60 0Z" stroke="#0F172A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <path d="M548 540v110" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <path d="M590 552c-18 18-18 54 0 72" stroke="#0F172A" stroke-width="10" stroke-linecap="round" opacity="0.4"/>

  <!-- subtle cracks -->
  <path d="M252 820c44-32 88-48 132-46" stroke="#0F172A" stroke-width="6" stroke-linecap="round" opacity="0.18"/>
  <path d="M650 806c-30-44-76-70-132-78" stroke="#0F172A" stroke-width="6" stroke-linecap="round" opacity="0.16"/>

  <rect x="34" y="34" width="832" height="1057" rx="48" filter="url(#grain)" opacity="0.18"/>
</svg>
